# Phase-4a Cartpole (DMControl) JEPA training data.
# Mirrors data/dmc.yaml; sources the random-policy Cartpole .lance collected by
# scripts/data/collect_dmc_random.py. Trains on pixels + action (+ observation);
# the privileged qpos/qvel columns are present on disk but not loaded here — they
# are only read by the eval / GCS callables (plan/config/cartpole.yaml).
dataset:
  num_steps: ${eval:'${wm.num_preds} + ${wm.history_size}'}
  frameskip: 5
  name: dmc/cartpole_random.h5
  keys_to_load:
    - pixels
    - action
    - observation
  keys_to_cache:
    - action
    - observation
