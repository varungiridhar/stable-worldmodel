# Vision-only (pixel) TD-MPC2 config — the cross-paradigm latent world model
# whose INPUT MODALITY matches the JEPA zoo (pixel encoders). Trains on the
# EXACT same tworoom_expert.lance pixels and is planned with a plain
# goal-IMAGE-MSE objective (NOT augmented state). This is "vision-only TD-MPC2"
# used purely as a vessel to create a latent space for the v3 metric to probe —
# low downstream success is acceptable; the gate is a finite v3.
#
# Differences from the state-based tdmpc2.yaml:
#   * encoding: {pixels: 128}            (CNN encoder, no privileged state)
#   * goal_obs_key / goal_col: null      (NO augmented-state goal-conditioning)
#   * plan_cost: goal_image_mse          (plain pixel goal-image-MSE planning)
#   * image_size: 64                     (TD-MPC2 native; pixels resized by the
#                                         same pixel preprocessor as the JEPA zoo)
defaults:
  - _self_
  - launcher: local

hydra:
  job:
    chdir: true

# --- Run ---
output_model_name: tdmpc2_output
subdir: null
seed: 1

# --- Checkpointing (dense ckpts for the v3 probe protocol) ---
epoch_interval: 1          # save *_epoch_N_object.ckpt every N epochs
step_interval: 0           # >0: uniform-cadence *_step_N_object.ckpt
intra_epoch_steps: null    # one-shot global-step thresholds (early training)
intra_epoch_max_epoch: 0   # only fire intra_epoch_steps below this epoch

# --- Planning cost path ---
# goal_image_mse : differentiable PLAIN pixel goal-image-MSE cost (PLAN+PROBE
#                  here): encode goal image -> goal latent; roll dynamics under
#                  the action candidates; latent-MSE of final rollout to goal.
# goal_mse       : augmented-state goal-MSE cost (state models only)
# reward_value   : native TD-MPC2 reward/value cost
# null           : auto -> goal_image_mse when pixels-encoded and a 'goal' image
#                  is present in the info_dict
plan_cost: goal_image_mse

# --- Data ---
dataset_name: null
goal_obs_key: null         # NO augmented-state goal-conditioning (vision-only)
goal_col: null
cache_dir: null
cache_dataset: true
batch_size: 256
num_workers: 16
train_split: 0.9
image_size: 64             # TD-MPC2 native; the .lance pixels are resized to 64

# --- Planning / MPPI parameters used only during evaluation ---
mpc: true
iterations: 12
num_samples: 1024
num_elites: 64
num_pi_trajs: 256
min_std: 0.01
max_std: 0.1
temperature: 0.5

# --- World Model ---
wm:
  horizon: 5
  mlp_dim: 384
  enc_dim: 256
  simnorm_dim: 8
  num_q: 5
  rho: 0.5
  tau: 0.01
  consistency_coef: 20.0
  reward_coef: 0.1
  value_coef: 0.1
  discount: 0.99
  uncertainty_penalty: 0.5
  entropy_coef: 1e-4
  name: tdmpc2

  num_bins: 101
  vmin: -6
  vmax: 2

  encoding:
    pixels: 128

# --- Optimizer ---
optimizer:
  type: AdamW
  lr: 3e-4
enc_lr_scale: 0.3

# --- Trainer ---
trainer:
  max_epochs: 250
  strategy: auto
  devices: 1
  accelerator: gpu
  precision: 16-mixed
  gradient_clip_val: 20.0

# --- Logging ---
wandb:
  enable: True
  project: null
  entity: null
