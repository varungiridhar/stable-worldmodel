defaults:
  - launcher: local
  - solver: cem
  - _self_

# ── JEPA (PLDM / LeWM / PreJEPA) Cube planning/eval ──────────────────────────
# Pixel-latent planning with an IMAGE goal. The env renders the front_pixels
# camera live into info['pixels']; the dataset-sliced goal (the on-disk
# `pixels_front_pixels` view, aliased to `pixels`) is the SAME camera, so
# World._extract_init_goal puts the goal image under info['goal'] for get_cost.
# Start state + goal cube target are set on the unwrapped env via callables.
world:
  env_name: swm/OGBCube-v0
  num_envs: ${eval.num_eval}
  max_episode_steps: ??? # set to 2*eval_budget by eval_wm.py
  env_type: single
  ob_type: pixels
  multiview: False
  width: 224
  height: 224
  visualize_info: False
  terminate_at_goal: True

seed: 42
policy: random # ckpt name (e.g. p3cubesmoke_pldm_s0/weights_epoch_3.pt) or random

plan_config:
  horizon: 5
  receding_horizon: 5
  action_block: 5 # frameskip

dataset:
  stats: ${eval.dataset_name}
  # Alias the front-camera view to the logical `pixels` name the goal-image
  # pipeline expects; load only what eval needs (NOT the heavy side views).
  column_aliases:
    pixels: pixels_front_pixels
  keys_to_load:
    - pixels
    - action
    - qpos
    - qvel
    - privileged/block_0_pos
  keys_to_cache:
    - action

eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: ogbench/cube_single_multiview_expert.lance
  # GOAL SOURCE:
  #   offset (DEFAULT) — goal image + success target both come from a FUTURE
  #     dataset frame at goal_offset_steps ahead of the start step (legacy
  #     behavior; wired via the callables below + world._extract_init_goal).
  #   native — goal image + success target come from the FIXED OGBench Cube
  #     native task goals (task_infos[task_id]). The start/init state still comes
  #     from the dataset (set_state callable); only the GOAL differs. Tasks are
  #     cycled across the num_eval envs from task_ids below.
  goal_mode: offset
  task_ids: [0, 1, 2, 3, 4]
  callables:
    # -- set the start state (full mujoco qpos/qvel at the start step)
    - method: set_state
      args:
        qpos:
          value: qpos
        qvel:
          value: qvel
    # -- set the SHARED goal cube target = the expert cube position
    #    goal_offset_steps ahead (goal_privileged/block_0_pos = block_0_pos at
    #    start+offset). Drives env success identically for every paradigm: the
    #    cube must reach within 0.04m of this position. This is the SAME goal the
    #    JEPA goal image (pixels[start+offset]) and the TD-MPC2 goal observation
    #    (observation[start+offset]) depict.
    - method: set_target_pos
      args:
        cube_id:
          value: 0
          in_dataset: False
        target_pos:
          value: goal_privileged/block_0_pos

output:
  filename: cube_results.txt

# v3 probe (grad_dump.py / esnr_probe.py) — same start/goal states as eval.
esnr:
  num_samples: 96
  var_scale: 1.0
  obs_batch: 1
  sample_batch: 16
  proposal: prior
  out_csv: ./esnr_row.csv
  train_seed: null
  global_step: null
  run_name: null
  out_dir: ./esnr_rows
