defaults:
  - launcher: local
  - solver: cem
  - _self_

world:
  env_name: swm/TwoRoom-v1
  num_envs: ${eval.num_eval}
  max_episode_steps: ??? # make sure it's >= eval_budget
seed: 42
policy: gcbc # ckpt name or random

plan_config:
  horizon: 5
  receding_horizon: 5
  action_block: 5 # frameskip

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action
    - proprio

# evaluation from dataset (replay expert trajectories)
eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: tworoom.h5
  callables:
    # -- set state
    # NOTE: collect_tworooms.py records the agent/target positions under the
    # `state`/`goal_state` columns (see two_room/env.py _get_obs); the stock
    # `pos_agent`/`goal_pos_agent` names match the S3 tworoom.h5, not our
    # locally-collected tworoom_expert.lance.
    - method: _set_state
      args:
        state:
          value: state
    # -- set goal state
    - method: _set_goal_state
      args:
        goal_state:
          value: goal_state

output:
  filename: tworoom_results.txt

# ESNR probe (scripts/plan/esnr_probe.py) -- ignored by eval_wm.py.
# Uses the same start states / goal_offset / dataset as eval; B = eval.num_eval.
esnr:
  num_samples: 300      # N action samples per observation
  var_scale: 1.0        # CEM-prior std of the action proposal N(0, var_scale)
  obs_batch: 1          # observations held in memory together
  sample_batch: 16      # action samples per get_cost+backward (bounds GPU mem;
                        # exact -- per-sample grads are independent)
  proposal: prior       # only 'prior' implemented
  out_csv: ./esnr_row.csv
  train_seed: null      # provenance only (recorded in the CSV row)
  global_step: null     # provenance only
  # -- batched sweep (esnr_probe_sweep.py) --
  run_name: null        # checkpoint dir under $STABLEWM_HOME/checkpoints/ to sweep
  out_dir: ./esnr_rows  # one CSV per checkpoint written here (skip-if-exists)
