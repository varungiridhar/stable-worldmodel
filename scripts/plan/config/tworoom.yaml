defaults:
  - launcher: local
  - solver: cem
  - _self_

world:
  env_name: swm/TwoRoom-v1
  num_envs: ${eval.num_eval}
  max_episode_steps: ??? # make sure it's >= eval_budget
seed: 42
policy: gcbc # ckpt name or random

plan_config:
  horizon: 5
  receding_horizon: 5
  action_block: 5 # frameskip

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action
    - proprio

# evaluation from dataset (replay expert trajectories)
eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: tworoom.h5
  callables:
    # -- set state
    # NOTE: collect_tworooms.py records the agent/target positions under the
    # `state`/`goal_state` columns (see two_room/env.py _get_obs); the stock
    # `pos_agent`/`goal_pos_agent` names match the S3 tworoom.h5, not our
    # locally-collected tworoom_expert.lance.
    - method: _set_state
      args:
        state:
          value: state
    # -- set goal state
    - method: _set_goal_state
      args:
        goal_state:
          value: goal_state

output:
  filename: tworoom_results.txt
